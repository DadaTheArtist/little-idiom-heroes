<!DOCTYPE html>
<html lang="zh-Hant">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>小小成語英雄：特效校準版</title>
    <style>
        :root {
            --bg-ui: rgba(0, 0, 0, 0.85);
            --primary-red: #b30000;
            --gold: #ffd700;
            /* 定義統一的 Boss 寬度，確保底圖與特效一致 */
            --boss-width: clamp(280px, 75vw, 350px);
        }

        body {
            margin: 0; padding: 0; overflow: hidden;
            font-family: 'PingFang TC', 'Microsoft JhengHei', sans-serif;
            background-color: #000; color: white;
            user-select: none; touch-action: none; 
        }

        /* 啟動介面 */
        #start-overlay {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: radial-gradient(circle, #2c0000 0%, #000 100%);
            z-index: 9999; display: flex; flex-direction: column;
            justify-content: center; align-items: center; gap: 12px;
        }

        .mode-title { color: var(--gold); font-size: clamp(32px, 8vw, 56px); text-shadow: 0 0 20px var(--primary-red); }

        .action-btn {
            padding: 14px; font-size: 18px; font-weight: bold; cursor: pointer;
            background: var(--primary-red); color: white; border: 3px solid #ff4d4d;
            border-radius: 50px; width: 260px; max-width: 90%;
        }

        /* 遊戲主容器 */
        #game-container {
            position: relative; width: 100vw; height: 100vh;
            background-size: var(--boss-width) auto; 
            background-repeat: no-repeat;
            background-position: center 10%; /* 統一基準點：10% */
            transition: background-image 0.5s;
        }

        /* 修正：特效層位置與底圖完全重合 */
        .boss-effect-layer {
            position: absolute; 
            top: 10%; /* 與底圖 background-position 一致 */
            left: 50%; 
            transform: translateX(-50%);
            width: var(--boss-width); /* 使用統一寬度變數 */
            height: 40vh; /* 設定足夠高度容納 GIF */
            background-size: contain; 
            background-repeat: no-repeat; 
            background-position: center top; 
            pointer-events: none; 
            display: none; 
            z-index: 15;
        }

        #status-text {
            position: absolute; 
            top: 25%; /* 疊加在 Boss 身上 */
            left: 50%; 
            transform: translate(-50%, -50%);
            font-size: clamp(26px, 8vw, 48px); 
            font-weight: 900; 
            z-index: 20; 
            pointer-events: none; 
            text-shadow: 0 0 15px #000; 
            display: none;
        }

        /* UI 區域 */
        #ui-overlay {
            position: absolute; bottom: 0; width: 100%; height: 52vh;
            background: linear-gradient(to top, #000 88%, rgba(0,0,0,0.4));
            border-top: 3px solid var(--primary-red);
            display: flex; flex-direction: column; align-items: center;
            padding: 10px 10px 30px 10px;
            box-sizing: border-box;
        }

        #boss-hp-container {
            position: absolute; top: -42px; left: 50%; transform: translateX(-50%);
            width: 80%; max-width: 320px; height: 26px; background: rgba(255, 255, 255, 0.1);
            border: 2px solid #ff4d4d; border-radius: 15px; overflow: hidden;
        }
        #boss-hp-fill { height: 100%; background: linear-gradient(90deg, #ff0000, #800000); width: 100%; transition: width 0.4s; }
        #hp-text { position: absolute; width: 100%; text-align: center; font-size: 15px; top: 2px; font-weight: bold; }

        #question-area { 
            font-size: clamp(17px, 4.8vw, 24px); margin: 10px 0 5px 0; text-align: center; 
            color: #ffeb3b; min-height: 70px; display: flex; align-items: center; 
            max-width: 92%; line-height: 1.4; 
        }

        #answer-area { 
            display: flex; width: 96%; justify-content: center; 
            gap: 6px; margin-bottom: 12px; 
        }
        .answer-target { 
            flex: 1; height: clamp(52px, 13vw, 70px); 
            background: rgba(45, 45, 45, 0.95); border: 1.5px solid #666; 
            border-radius: 10px; display: flex; justify-content: center; 
            align-items: center; font-size: clamp(14px, 3.8vw, 20px); 
            font-weight: bold; text-align: center;
        }
        .answer-target.hover { background: rgba(255, 215, 0, 0.25); border-color: var(--gold); }

        #sword-container { flex-grow: 1; width: 100%; position: relative; }
        #sword { 
            width: clamp(100px, 24vw, 120px); 
            height: clamp(100px, 24vw, 120px); 
            background-image: url('img/attack.png'); 
            background-size: contain; 
            background-repeat: no-repeat; 
            background-position: center;
            position: absolute; left: 50%; top: 40%;
            transform: translate(-50%, -50%);
            cursor: grab; touch-action: none; z-index: 50;
        }

        #victory-screen { 
            position: fixed; top: 0; left: 0; width: 100%; height: 100%; 
            background: rgba(0, 0, 0, 0.95); display: none; flex-direction: column; 
            justify-content: center; align-items: center; z-index: 5000;
        }

        @keyframes shake { 0%, 100% { transform: translate(0,0); } 20% { transform: translate(-8px, 8px); } 80% { transform: translate(10px, 10px); } }
        .boss-defeated { animation: bossDeath 2s forwards !important; }
        @keyframes bossDeath { 100% { opacity: 0; transform: translateY(-120px) scale(0); filter: brightness(5); } }
    </style>
</head>
<body>

<audio id="bgm" loop></audio>

<div id="start-overlay">
    <div class="mode-title">小小勇者成語傳說</div>
    <div class="setting-group">
        <button class="num-btn" id="n10" onclick="setNum(10, this)">10 題</button>
        <button class="num-btn" id="n20" onclick="setNum(20, this)">20 題</button>
    </div>
    <button class="action-btn" onclick="handleStart(1)">成語解釋模式</button>
    <button class="action-btn" onclick="handleStart(2)">例句造句模式</button>
</div>

<div id="game-container">
    <div id="attack-effect" class="boss-effect-layer"></div>
    <div id="defense-effect" class="boss-effect-layer"></div>
    <div id="status-text"></div>

    <div id="ui-overlay">
        <div id="boss-hp-container">
            <div id="boss-hp-fill"></div>
            <div id="hp-text">HP: 10 / 10</div>
        </div>
        <div id="question-area">模式載入中...</div>
        <div id="answer-area">
            <div class="answer-target" id="target-0"></div>
            <div class="answer-target" id="target-1"></div>
            <div class="answer-target" id="target-2"></div>
        </div>
        <div id="sword-container">
            <div id="sword"></div>
        </div>
    </div>
</div>

<div id="victory-screen">
    <h1 style="font-size: clamp(40px, 10vw, 72px); color: var(--gold); text-shadow: 0 0 30px var(--gold);">恭喜完成！</h1>
    <button onclick="location.reload()" class="action-btn">回到首頁</button>
</div>

<script>
    // 資料庫與邏輯保持不變...
    let totalQuestions = 10;
    let gameMode = 1;
    // ... (idiomDatabase 內容) ...
    const idiomDatabase = [
  { idiom: '事與願違', qmode1: '事實和願望相違背', qmode2: '我們原本想去野餐，但 _____，出門前突然下起大雨。' },
  { idiom: '暮鼓晨鐘', qmode1: '佛寺中早晚報時的鐘鼓。後也用來指一日的時光，或比喻使人警醒的力量', qmode2: '爺爺的一番話語有如 _____，使我突然領悟與人相處的道理。' },
  { idiom: '揠苗助長', qmode1: '比喻使用不當的手段以求速成，結果不但無益，反而有害', qmode2: '你一下子給花施這麼多肥料，小心 _____，造成反效果。' },
  { idiom: '開誠布公', qmode1: '比喻誠意待人，坦白無私', qmode2: '班長希望大家 _____ 的談一談，以化解彼此的誤會。' },
  { idiom: '焦頭爛額', qmode1: '比喻做事陷入十分狼狽窘迫的困境或犧牲慘重', qmode2: '他最近為了畫展的事，忙得 _____，連吃飯的時間都沒有。' },
  { idiom: '防微杜漸', qmode1: '在錯誤或壞事萌發的時候及時制止，杜絕它發展', qmode2: '小疏忽往往釀成大禍，我們應該 _____，避免日後衍生大問題時。' },
  { idiom: '披星戴月', qmode1: '形容早出晚歸、連夜趕路或工作非常的勞累', qmode2: '爸爸為了家人，每天 _____ 的工作，好讓我們衣食無缺。' },
  { idiom: '順水推舟', qmode1: '順著水流推船。比喻順應情勢做事', qmode2: '他的實力本來就不差，我只不過 _____ 拉他一把，讓他有表現的機會。' },
  { idiom: '功敗垂成', qmode1: '指事情在即將成功時卻失敗了', qmode2: '做任何事若不能堅持到底，就會 _____。' },
  { idiom: '世態炎涼', qmode1: '比喻世俗情態反覆無常', qmode2: '他在得意時受人景仰，失意時被大家唾棄，這正是 _____ 的最好寫照。' },
  { idiom: '津津有味', qmode1: '形容興味濃厚的樣子。形容食欲很好或食物的美味', qmode2: '這本小說內容曲折離奇，讓人讀後覺得 _____。' },
  { idiom: '價值連城', qmode1: '形容物品十分珍貴', qmode2: '這幅水墨畫 _____，是國寶級的寶物。' },
  { idiom: '各式各樣', qmode1: '形容許多不同樣式、種類的東西', qmode2: '行人撐起了 _____ 的雨傘，路上開滿了一朵朵五顏六色的傘花。' },
  { idiom: '五顏六色', qmode1: '形容色彩複雜而豐富', qmode2: '今天晚會施放的煙火 _____，光輝燦爛，令人讚嘆不已。' },
  { idiom: '千鈞一髮', qmode1: '千鈞的重量繫掛在一根頭髮上。比喻情況非常危險、危急', qmode2: '比賽到了 _____ 的時刻，隊長的一記三分球，使我隊終場以一分險勝。' },
  { idiom: '拾人牙慧', qmode1: '比喻蹈襲他人的言論或主張', qmode2: '這篇論文幾乎沒有自己的認知 and 想法，只不過是 _____ 而已。' },
  { idiom: '麻木不仁', qmode1: '比喻對事物漠不關心或反應遲鈍', qmode2: '災區死傷情況那麼嚴重，還是有些人 _____，不聞不問。' },
  { idiom: '風馳電掣', qmode1: '指像風那樣奔跑，像電光那樣急閃而過。形容速度很快', qmode2: '一接到通報，消防車立即 _____ 的趕到失火地點。' },
  { idiom: '不學無術', qmode1: '指人未經學習而沒有學問才幹', qmode2: '他的心地雖然不壞，卻因 _____ 而無法獲得大家的認同。' },
  { idiom: '推波助瀾', qmode1: '比喻推動鼓勵；或比喻從旁鼓動，使事態擴大', qmode2: '保存鄉土文化的風潮在政府的 _____ 下，全面展開。' },
  { idiom: '數典忘祖', qmode1: '比喻人忘本', qmode2: '他只知指責西洋樂，而不知自己國家的音樂，真有點兒 _____！' },
  { idiom: '惱羞成怒', qmode1: '因羞愧到極點而發生憤怒', qmode2: '面對大家不斷的羞愧，他 _____ 了。' },
  { idiom: '老嫗能解', qmode1: '形容文字通俗明白，淺顯易懂', qmode2: '這位作家的作品平易近人， _____ ，因此深受讀者歡迎。' },
  { idiom: '班門弄斧', qmode1: '比喻在行家面前賣弄本事，不自量力', qmode2: '今天我竟然在專家面前大談西洋美術史，真是 _____。' },
  { idiom: '循循善誘', qmode1: '形容善於循序漸進的誘導別人', qmode2: '在老師的 _____ 之下，他的成績有了很大的進步。' },
  { idiom: '咫尺天涯', qmode1: '比喻相距雖近，卻如同相隔千里，不能相見', qmode2: '人若有緣，天涯咫尺；人若無緣， _____。' },
  { idiom: '門庭若市', qmode1: '比喻上門來的人很多', qmode2: '這家餐廳物美價廉，因此每到用餐時間總是 _____。' },
  { idiom: '猶豫不決', qmode1: '遲疑不定，無法拿定主意', qmode2: '他對出國留學這件事情 _____ ，遲遲無法決定。' },
  { idiom: '千篇一律', qmode1: '形容事物的形式呆板而毫無變化', qmode2: '外面賣的便當，幾乎天天都是那幾樣菜， _____ ，吃都吃膩了。' },
  { idiom: '改過自新', qmode1: '改正過失，重新做人', qmode2: '雖然他犯了過錯，但只要他能 _____ ，大家就原諒他吧！' },
  { idiom: '設身處地', qmode1: '假想自己處在他人地位或情況中', qmode2: '他凡事能 _____ 為別人著想，所以很受歡迎。' },
  { idiom: '付之一炬', qmode1: '指物品、成果全數被燒毀', qmode2: '他的財產在這場火災中全部 _____。' },
  { idiom: '一清二楚', qmode1: '十分清楚、明白', qmode2: '奶奶戴上新配好的老花眼鏡，開心的表示可以看得 _____。' },
  { idiom: '有目共睹', qmode1: '指事實極為明顯，所有人都知道', qmode2: '他在古典音樂的貢獻，世人 _____ ，如今獲頒獎項真是實至名歸。' },
  { idiom: '鵬程萬里', qmode1: '比喻前程遠大，不可限量', qmode2: '校長在畢業典禮上，祝福畢業生 _____ ，一帆風順。' },
  { idiom: '張口結舌', qmode1: '形容恐懼慌張，或理虧說不出話的樣子', qmode2: '他在眾人的追問下，一時之間 _____ ，什麼話也說不出來。' },
  { idiom: '立竿見影', qmode1: '比喻迅速收到成效', qmode2: '新的交通法規才剛實施，就收到 _____ 的成效。' },
  { idiom: '包羅萬象', qmode1: '形容內容豐富，應有盡有', qmode2: '大賣場的商品 _____ ，幾乎你想得到的東西都可以找到。' },
  { idiom: '觸類旁通', qmode1: '根據對已知事物的認識與理解，進而通達對其他類似事物', qmode2: '老師不厭其煩的講解例題，就是要讓我們能 _____ ，舉一反三。' },
  { idiom: '大開眼界', qmode1: '明顯的使視野開展，見聞增加', qmode2: '今天到故宮參觀，看見數不清的歷代寶物，真是讓我 _____。' },
  { idiom: '七嘴八舌', qmode1: '形容人多口雜，各說各的樣子', qmode2: '下課後，大家立刻 _____ 的討論運動會的比賽項目。' },
  { idiom: '千奇百怪', qmode1: '形容事物外觀奇特，種類繁多', qmode2: '弟弟聰明活潑，經常會有 _____ 的點子。' }    ];

    let currentQuestions = [];
    let currentQuestionIndex = 0;
    let bossHp = 10;
    let isGameOver = false;

    const sword = document.getElementById('sword');
    const bgm = document.getElementById('bgm');
    const answerTargets = document.querySelectorAll('.answer-target');

    function setNum(n, btn) {
        totalQuestions = n;
        document.querySelectorAll('.num-btn').forEach(b => b.classList.remove('active'));
        btn.classList.add('active');
    }
    // 預設選 10 題
    setNum(10, document.getElementById('n10'));

    function handleStart(mode) {
        gameMode = mode;
        const randomMusicNum = Math.floor(Math.random() * 3) + 1;
        bgm.src = `audio/bgm-${randomMusicNum}.mp3`;
        bgm.play().catch(()=>{});
        document.getElementById('start-overlay').style.display = 'none';
        startGame();
    }

    function startGame() {
        bossHp = totalQuestions;
        currentQuestionIndex = 0;
        isGameOver = false;
        const randomBossNum = Math.floor(Math.random() * 5) + 1;
        document.getElementById('game-container').style.backgroundImage = `url('img/boss-${randomBossNum}.png')`;
        currentQuestions = [...idiomDatabase].sort(() => 0.5 - Math.random()).slice(0, totalQuestions);
        updateHpUI();
        loadQuestion();
    }

    function loadQuestion() {
        if (isGameOver || currentQuestionIndex >= currentQuestions.length) return;
        const currentData = currentQuestions[currentQuestionIndex];
        document.getElementById('question-area').textContent = (gameMode === 1) ? currentData.qmode1 : currentData.qmode2;
        let wrongOptions = idiomDatabase.filter(item => item.idiom !== currentData.idiom).sort(() => 0.5 - Math.random()).slice(0, 2).map(item => item.idiom);
        let options = [currentData.idiom, ...wrongOptions].sort(() => 0.5 - Math.random());
        answerTargets.forEach((target, index) => {
            target.textContent = options[index];
            target.style.background = "rgba(45, 45, 45, 0.95)";
            target.classList.remove('hover');
        });
    }

    function updateHpUI() {
        document.getElementById('boss-hp-fill').style.width = `${(bossHp / totalQuestions) * 100}%`;
        document.getElementById('hp-text').textContent = `HP: ${bossHp} / ${totalQuestions}`;
    }

    // Pointer Events 邏輯
    let isDragging = false;
    let startX, startY;

    sword.addEventListener('pointerdown', (e) => {
        if(isGameOver) return;
        isDragging = true;
        sword.setPointerCapture(e.pointerId);
        startX = e.clientX;
        startY = e.clientY;
    });

    window.addEventListener('pointermove', (e) => {
        if (!isDragging) return;
        const dx = e.clientX - startX;
        const dy = e.clientY - startY;
        sword.style.transform = `translate(calc(-50% + ${dx}px), calc(-50% + ${dy}px))`;

        answerTargets.forEach(target => {
            const rect = target.getBoundingClientRect();
            if (e.clientX > rect.left && e.clientX < rect.right && e.clientY > rect.top && e.clientY < rect.bottom) {
                target.classList.add('hover');
            } else {
                target.classList.remove('hover');
            }
        });
    });

    window.addEventListener('pointerup', (e) => {
        if (!isDragging) return;
        isDragging = false;
        let hitTarget = null;
        answerTargets.forEach(target => {
            const rect = target.getBoundingClientRect();
            if (e.clientX > rect.left && e.clientX < rect.right && e.clientY > rect.top && e.clientY < rect.bottom) {
                hitTarget = target;
            }
        });
        if (hitTarget) checkAnswer(hitTarget);
        sword.style.transform = `translate(-50%, -50%)`;
    });

    function checkAnswer(target) {
        const isCorrect = target.textContent === currentQuestions[currentQuestionIndex].idiom;
        if (isCorrect) {
            bossHp--;
            updateHpUI();
            triggerStatus('success');
            document.getElementById('game-container').style.animation = "shake 0.3s";
            setTimeout(() => document.getElementById('game-container').style.animation = "", 300);
            if (bossHp <= 0) {
                isGameOver = true;
                document.getElementById('game-container').classList.add('boss-defeated');
                setTimeout(() => document.getElementById('victory-screen').style.display = 'flex', 2000);
            } else {
                currentQuestionIndex++;
                setTimeout(loadQuestion, 500);
            }
        } else {
            triggerStatus('fail');
            target.style.background = "rgba(244, 67, 54, 0.4)";
        }
    }

    function triggerStatus(type) {
        const status = document.getElementById('status-text');
        const attack = document.getElementById('attack-effect');
        const defense = document.getElementById('defense-effect');
        if (type === 'success') {
            status.textContent = '命中！HP - 1';
            status.style.color = '#ffd700';
            attack.style.backgroundImage = `url('img/boss-attack.gif?t=${Date.now()}')`;
            attack.style.display = 'block';
        } else {
            status.textContent = '防禦！Miss';
            status.style.color = '#ff4d4d';
            defense.style.backgroundImage = `url('img/boss-def.gif?t=${Date.now()}')`;
            defense.style.display = 'block';
        }
        status.style.display = 'block';
        setTimeout(() => {
            status.style.display = 'none';
            attack.style.display = 'none';
            defense.style.display = 'none';
        }, 1500);
    }
</script>
</body>
</html>
